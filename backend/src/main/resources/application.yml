server:
  port: 8080

spring:
  application:
    name: outfit-combine-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:outfit_combine}
    username: ${DB_USER:outfit_user}
    password: ${DB_PASSWORD:outfit_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/outfit-combine}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/outfit-combine/protocol/openid-connect/certs}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minio}
    secret-key: ${MINIO_SECRET_KEY:minio_password}
    bucket: ${MINIO_BUCKET:outfit-combine}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  weather:
    api-key: ${OPENWEATHERMAP_API_KEY:}
    base-url: ${OPENWEATHERMAP_BASE_URL:https://api.openweathermap.org}
