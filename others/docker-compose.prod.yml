# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Required env vars: KC_HOSTNAME, FRONTEND_ORIGIN, EXPO_PUBLIC_API_URL, MINIO_PUBLIC_URL
# Required Docker secrets (create with: docker secret create <name> <file>):
#   postgres_password, keycloak_admin_password, minio_password,
#   db_password, anthropic_api_key, openweathermap_api_key
services:
  postgres:
    restart: always
    image: postgres:16.6-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  keycloak:
    restart: always
    image: quay.io/keycloak/keycloak:25.0
    command: start --import-realm --optimized
    environment:
      KC_DB_PASSWORD_FILE: /run/secrets/postgres_password
      KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KC_HOSTNAME: ${KC_HOSTNAME:?KC_HOSTNAME env var is required for prod}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    secrets:
      - postgres_password
      - keycloak_admin_password
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  minio:
    restart: always
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    secrets:
      - minio_password
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    secrets:
      - minio_password
    entrypoint: >
      /bin/sh -c "
      MINIO_ROOT_PASSWORD=$$(cat /run/secrets/minio_password) &&
      mc alias set local http://minio:9000 minio $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/outfit-combine &&
      mc anonymous set public local/outfit-combine &&
      echo 'MinIO bucket initialized'
      "

  backend:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PASSWORD_FILE: /run/secrets/db_password
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      OPENWEATHERMAP_API_KEY_FILE: /run/secrets/openweathermap_api_key
      KEYCLOAK_ISSUER_URI: ${KC_HOSTNAME:?KC_HOSTNAME env var is required for prod}/realms/outfit-combine
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/outfit-combine/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN env var is required for prod}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:?MINIO_PUBLIC_URL env var is required for prod}
    secrets:
      - db_password
      - anthropic_api_key
      - openweathermap_api_key
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  frontend_web:
    restart: always
    build:
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:?EXPO_PUBLIC_API_URL env var is required for prod}
        EXPO_PUBLIC_KEYCLOAK_URL: ${KC_HOSTNAME:?KC_HOSTNAME env var is required for prod}
        EXPO_PUBLIC_KEYCLOAK_REALM: outfit-combine
        EXPO_PUBLIC_KEYCLOAK_CLIENT_ID: outfit-combine-web
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

secrets:
  postgres_password:
    external: true
  keycloak_admin_password:
    external: true
  minio_password:
    external: true
  db_password:
    external: true
  anthropic_api_key:
    external: true
  openweathermap_api_key:
    external: true
