name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outfit-combine_backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -q

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: outfit-combine_backend/target/surefire-reports/

  frontend-web:
    name: Frontend Web Type Check + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outfit-combine_frontend_web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: outfit-combine_frontend_web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (expo export)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: http://localhost:8080/api/v1
          EXPO_PUBLIC_KEYCLOAK_URL: http://localhost:8081
          EXPO_PUBLIC_KEYCLOAK_REALM: outfit-combine
          EXPO_PUBLIC_KEYCLOAK_CLIENT_ID: outfit-combine-web

  frontend-mobile:
    name: Frontend Mobile Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outfit-combine_frontend_mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: outfit-combine_frontend_mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate base compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate dev compose
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet
