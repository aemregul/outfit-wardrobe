apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: outfit-combine
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: backend
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: [backend:8080]

      - job_name: postgres
        static_configs:
          - targets: [postgres-exporter:9187]

  alert-rules.yml: |
    groups:
      - name: outfit-combine
        rules:
          - alert: BackendDown
            expr: up{job="backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend service is down"

          - alert: HighErrorRate
            expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP 5xx error rate: {{ $value | humanize }}/s"

          - alert: HighResponseTime
            expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P95 response time > 2s: {{ $value | humanizeDuration }}"

          - alert: JvmHeapHigh
            expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "JVM heap usage above 85%"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: outfit-combine
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: outfit-combine
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
