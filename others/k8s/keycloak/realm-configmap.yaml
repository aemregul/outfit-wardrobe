apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: outfit-combine
data:
  realm-export.json: |
    {
      "realm": "outfit-combine",
      "displayName": "Outfit Combine",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": true,
      "registrationEmailAsUsername": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": false,
      "roles": {
        "realm": [
          { "name": "USER", "description": "Standard application user", "composite": false, "clientRole": false, "attributes": {} },
          { "name": "ADMIN", "description": "Application administrator", "composite": false, "clientRole": false, "attributes": {} },
          { "name": "MODERATOR", "description": "Application moderator", "composite": false, "clientRole": false, "attributes": {} },
          {
            "name": "default-roles-outfit-combine",
            "description": "${role_default-roles}",
            "composite": true,
            "composites": { "realm": ["USER"] },
            "clientRole": false,
            "attributes": {}
          }
        ]
      },
      "defaultRole": {
        "name": "default-roles-outfit-combine",
        "description": "${role_default-roles}",
        "composite": true,
        "clientRole": false,
        "containerId": "outfit-combine"
      },
      "clients": [
        {
          "clientId": "outfit-combine-web",
          "name": "Outfit Combine Web",
          "description": "Public PKCE client for the Outfit Combine web application",
          "rootUrl": "http://localhost:3000",
          "adminUrl": "http://localhost:3000",
          "baseUrl": "http://localhost:3000",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "bearerOnly": false,
          "consentRequired": false,
          "frontchannelLogout": true,
          "protocol": "openid-connect",
          "redirectUris": ["http://localhost:3000/*", "http://localhost:19006/*"],
          "webOrigins": ["http://localhost:3000", "http://localhost:19006"],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "http://localhost:3000/*##http://localhost:19006/*",
            "backchannel.logout.session.required": "true",
            "backchannel.logout.revoke.offline.tokens": "false"
          },
          "fullScopeAllowed": true,
          "defaultClientScopes": ["web-origins", "acr", "roles", "profile", "email"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"],
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "consentRequired": false,
              "config": { "access.token.claim": "true", "id.token.claim": "true", "introspection.token.claim": "true" }
            }
          ]
        },
        {
          "clientId": "outfit-combine-mobile",
          "name": "Outfit Combine Mobile",
          "description": "Public PKCE client for the Outfit Combine React Native application",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "bearerOnly": false,
          "consentRequired": false,
          "frontchannelLogout": false,
          "protocol": "openid-connect",
          "redirectUris": ["outfitcombine://auth/callback"],
          "webOrigins": [],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "outfitcombine://auth/callback",
            "backchannel.logout.session.required": "true",
            "backchannel.logout.revoke.offline.tokens": "false"
          },
          "fullScopeAllowed": true,
          "defaultClientScopes": ["web-origins", "acr", "roles", "profile", "email"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"],
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "consentRequired": false,
              "config": { "access.token.claim": "true", "id.token.claim": "true", "introspection.token.claim": "true" }
            }
          ]
        }
      ],
      "users": [
        {
          "username": "e2e_alice",
          "email": "e2e_alice@example.com",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "Test1234!", "temporary": false }],
          "realmRoles": ["USER"]
        },
        {
          "username": "e2e_bob",
          "email": "e2e_bob@example.com",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "Test1234!", "temporary": false }],
          "realmRoles": ["USER"]
        }
      ]
    }
