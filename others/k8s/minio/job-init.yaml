apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: outfit-combine
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:RELEASE.2024-11-17T19-35-25Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio-service:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
              mc mb --ignore-existing local/outfit-combine &&
              mc anonymous set public local/outfit-combine &&
              echo "MinIO bucket initialized"
