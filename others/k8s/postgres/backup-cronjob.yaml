apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: outfit-combine
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  BACKUP_FILE="/backups/outfit-combine-$(date +%Y%m%d-%H%M%S).sql.gz"
                  pg_dump -h postgres -U "$POSTGRES_USER" "$POSTGRES_DB" | gzip > "$BACKUP_FILE"
                  echo "Backup written: $BACKUP_FILE"
                  find /backups -name "*.sql.gz" -mtime +7 -delete
                  echo "Old backups pruned (>7 days)"
              env:
                - name: POSTGRES_USER
                  value: outfituser
                - name: POSTGRES_DB
                  value: outfitdb
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: outfit-combine
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
